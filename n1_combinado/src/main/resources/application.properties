# Configuración del servidor embebido Tomcat
server.port=8080

# Configuración para vistas JSP (compatibilidad con vistas existentes)
spring.mvc.view.prefix=/WEB-INF/views/
spring.mvc.view.suffix=.jsp

# Configuración de logging para ver consultas SQL y errores
logging.level.org.springframework.web=INFO
logging.level.pe.edu.sistema=DEBUG

# Configuración de Jackson para JSON (pretty print para desarrollo)
spring.jackson.serialization.indent-output=true
